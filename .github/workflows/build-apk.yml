name: Build and Release APK

on:
  push:
    branches: [master, main]
  workflow_dispatch: # Allow manual trigger from GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies (mobile)
        working-directory: ./mobile
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > ./mobile/google-services.json
          # Remove from .gitignore so EAS local build includes it in the project archive
          sed -i '/google-services\.json/d' ./mobile/.gitignore
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add -f ./mobile/google-services.json

      - name: Build APK with EAS
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: true
        run: |
          echo "Building APK locally..."
          eas build --platform android --profile preview --non-interactive --local --output ./app.apk

          # Verify APK was built
          if [ -f "./app.apk" ]; then
            SIZE=$(ls -lh ./app.apk | awk '{print $5}')
            echo "✅ APK built successfully - Size: $SIZE"
          else
            echo "❌ APK build failed"
            exit 1
          fi

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ./mobile/app.apk
          tag_name: release-${{ github.run_number }}-${{ github.run_id }}
          release_name: "APK Build #${{ github.run_number }}"
          body: |
            ## 📱 Apartment Bill Tracker - Android APK

            **Build Number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Installation Instructions:
            1. Download `app.apk` from the assets below
            2. Transfer to your Android phone
            3. Open file manager → find APK → Tap to install
            4. Allow unknown sources if prompted
            5. Launch app!

            ### Features:
            - 👥 Room Management
            - 💰 Billing Tracking
            - 📊 Reports & Analytics
            - 📅 Attendance Tracking
            - 👤 Member Management

            **Backend:** Render.com deployment
            **Version:** ${{ github.ref }}

            Developed by: Rommel Belia
          draft: false
          prerelease: false

      - name: Comment on commit
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${status} APK Build #${{ github.run_number }} - Check [Releases](https://github.com/${{ github.repository }}/releases)`
            })
